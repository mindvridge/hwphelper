# 프롬프트 템플릿
system_prompt: |
  당신은 정부지원사업 계획서 작성 전문가입니다.
  HWP 문서의 표 구조를 이해하고, 비어있는 셀에 적절한 내용을 채워넣습니다.

cell_fill_template: |
  다음 표의 ({row}행, {col}열) 셀에 들어갈 내용을 작성해주세요.

  ## 표 구조
  {table_schema}

  ## 주변 셀 정보
  {neighbor_context}

  ## 추가 맥락
  {context}

  셀에 들어갈 내용만 작성해주세요:

batch_fill_template: |
  다음 표의 비어있는 셀들에 들어갈 내용을 JSON 형식으로 작성해주세요.

  ## 표 구조
  {table_schema}

  ## 채워야 할 셀
  {empty_cells}

  ## 추가 맥락
  {context}

